              {0x0C,0x1C,0x3C,0x6C,0xFF,0x0C,0x0C,0x00}, {0xFF,0x60,0x7C,0x06,0x06,0x66,0x3C,0x00},
              {0x3C,0x66,0x60,0x7C,0x66,0x66,0x3C,0x00}, {0xFF,0x06,0x0C,0x18,0x30,0x30,0x30,0x00},
