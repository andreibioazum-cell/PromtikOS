name: AetheriaOS-C - Pure C Bare Metal Terminal
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-aetheria-c:
    name: Build AetheriaOS Core (C)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools ndk;25.2.9519653'

      # ===== СОЗДАНИЕ ЯДРА НА C =====
      - name: Create C Kernel
        run: |
          mkdir -p kernel
          
          # 1. Заголовочный файл с основными типами
          cat > kernel/kernel.h << 'EOF'
          typedef unsigned int uint32_t;
          typedef unsigned char uint8_t;
          typedef unsigned long size_t;

          #define FB_WIDTH 1280
          #define FB_HEIGHT 720
          #define BG_COLOR 0xFF1A1B26
          #define TEXT_COLOR 0xFFC0CAF5
          #define PROMPT_COLOR 0xFF7AA2F7
          EOF

          # 2. Шрифт (8x8)
          cat > kernel/font.h << 'EOF'
