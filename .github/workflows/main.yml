name: PromtikOS - Stable Bare Metal C
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34 ndk;25.2.9519653'

      # ===== ЯДРО НА C =====
      - name: Create Kernel
        run: |
          mkdir -p kernel
          
          cat > kernel/kernel.h << 'EOF'
          typedef unsigned int uint32_t;
          typedef unsigned char uint8_t;
          #define FB_WIDTH 1280
          #define FB_HEIGHT 720
          #define BG_COLOR 0xFF101010
          #define TEXT_COLOR 0xFF00FF00
          EOF

          cat > kernel/kernel.c << 'EOF'
          #include "kernel.h"

          // Упрощенный шрифт внутри кода для стабильности
          void draw_pixel(uint32_t* fb, int x, int y, uint32_t color) {
              if (x >= 0 && x < FB_WIDTH && y >= 0 && y < FB_HEIGHT) fb[y * FB_WIDTH + x] = color;
          }

          void draw_rect(uint32_t* fb, int x, int y, int w, int h, uint32_t color) {
              for (int i = 0; i < h; i++)
                  for (int j = 0; j < w; j++) draw_pixel(fb, x + j, y + i, color);
          }

          // Точка входа
          void aetheria_main(uint32_t* fb, uint8_t* kb, uint32_t w, uint32_t h) {
              // Заливаем экран темным цветом
              for(int i=0; i < FB_WIDTH * FB_HEIGHT; i++) fb[i] = BG_COLOR;

              // Рисуем приветственный квадрат (логотип ОС)
              draw_rect(fb, 100, 100, 50, 50, 0xFFFF0000); 
              draw_rect(fb, 160, 100, 50, 50, 0xFF00FF00);
              draw_rect(fb, 220, 100, 50, 50, 0xFF0000FF);

              uint32_t color = TEXT_COLOR;
              int x_pos = 100;

              while (1) {
                  uint8_t key = *kb;
                  if (key != 0) {
                      *kb = 0;
                      // Если нажата клавиша, рисуем квадратик в позиции курсора
                      draw_rect(fb, x_pos, 200, 10, 10, color);
                      x_pos += 15;
                      if (x_pos > 1100) x_pos = 100;
                  }
                  // Небольшая пауза
                  for (volatile int i = 0; i < 50000; i++);
              }
          }
          EOF

          cat > kernel/linker.ld << 'EOF'
          ENTRY(aetheria_main)
          SECTIONS {
              . = 0x0;
              .text : { *(.text) }
              .data : { *(.data) }
              .bss  : { *(.bss) }
          }
          EOF

      - name: Compile Kernel
        run: |
          CC=$(find $ANDROID_HOME/ndk -name "aarch64-linux-android34-clang" | head -n 1)
          LLD=$(find $ANDROID_HOME/ndk -name "ld.lld" | head -n 1)
          OBJCOPY=$(find $ANDROID_HOME/ndk -name "llvm-objcopy" | head -n 1)
          
          $CC -c kernel/kernel.c -o kernel/kernel.o \
              -target aarch64-none-elf -fPIC \
              -ffreestanding -nostdlib -O2
          
          $LLD -T kernel/linker.ld kernel/kernel.o -o kernel/kernel.elf --image-base 0
          $OBJCOPY -O binary kernel/kernel.elf kernel.bin

      # ===== ANDROID APP =====
      - name: Create App
        run: |
          mkdir -p app/src/main/{java/com/promtik/os,cpp,res/raw}
          cp kernel.bin app/src/main/res/raw/kernel_bin
          
          # JNI Loader
          cat > app/src/main/cpp/loader.cpp << 'EOF'
          #include <jni.h>
          #include <sys/mman.h>
          #include <string.h>
          #include <android/log.h>

          extern "C" JNIEXPORT void JNICALL
          Java_com_promtik_os_MainActivity_runKernel(JNIEnv* env, jobject o, jbyteArray code, jobject fb, jobject kb) {
              jsize size = env->GetArrayLength(code);
              jbyte* data = env->GetByteArrayElements(code, 0);
              
              void* fb_ptr = env->GetDirectBufferAddress(fb);
              void* kb_ptr = env->GetDirectBufferAddress(kb);

              // Выделяем память с правами на выполнение
              void* mem = mmap(nullptr, size, PROT_READ | PROT_WRITE | PROT_EXEC, MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
              if (mem == MAP_FAILED) return;

              memcpy(mem, data, size);
              
              // Очистка кэша инструкций (важно для ARM)
              __builtin___clear_cache((char*)mem, (char*)mem + size);

              // Запуск ядра
              typedef void (*KernelEntry)(void*, void*, int, int);
              KernelEntry kmain = (KernelEntry)mem;
              kmain(fb_ptr, kb_ptr, 1280, 720);
          }
          EOF

          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(loader)
          add_library(loader SHARED loader.cpp)
          target_link_libraries(loader log)
          EOF

          # MainActivity
          cat > app/src/main/java/com/promtik/os/MainActivity.java << 'EOF'
          package com.promtik.os;
          import android.app.Activity;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          import java.nio.ByteBuffer;

          public class MainActivity extends Activity {
              static { System.loadLibrary("loader"); }
              private native void runKernel(byte[] code, ByteBuffer fb, ByteBuffer kb);

              private ByteBuffer fb = ByteBuffer.allocateDirect(1280 * 720 * 4);
              private ByteBuffer kb = ByteBuffer.allocateDirect(1);
              private Bitmap bmp = Bitmap.createBitmap(1280, 720, Bitmap.Config.ARGB_8888);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  SurfaceView sv = new SurfaceView(this);
                  setContentView(sv);

                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              try {
                                  byte[] k = getResources().openRawResource(R.raw.kernel_bin).readAllBytes();
                                  runKernel(k, fb, kb);
                              } catch(Exception e) {}
                          }).start();

                          new Thread(() -> {
                              while(true) {
                                  Canvas c = h.lockCanvas();
                                  if (c != null) {
                                      fb.position(0);
                                      bmp.copyPixelsFromBuffer(fb);
                                      c.drawBitmap(bmp, null, new Rect(0,0,sv.getWidth(),sv.getHeight()), null);
                                      h.unlockCanvasAndPost(c);
                                  }
                                  try { Thread.sleep(16); } catch(Exception e){}
                              }
                          }).start();
                      }
                      public void surfaceChanged(SurfaceHolder h, int f, int w, int h2) {}
                      public void surfaceDestroyed(SurfaceHolder h) {}
                  });

                  // Обработка нажатий экрана как клавиш для теста
                  sv.setOnTouchListener((v, event) -> {
                      if (event.getAction() == MotionEvent.ACTION_DOWN) kb.put(0, (byte)1);
                      return true;
                  });
              }
          }
          EOF

          # Настройки сборки (ABI Filter важен!)
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.promtik.os'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.promtik.os'
                  minSdk 24
                  targetSdk 34
                  ndk { abiFilters 'arm64-v8a' } 
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF

          echo 'include ":app"' > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="PromtikOS" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew || true
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PromtikOS-Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
