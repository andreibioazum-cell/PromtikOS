              {0x7E,0x06,0x0C,0x18,0x30,0x60,0x7E,0x00}, {0x3C,0x30,0x30,0x30,0x30,0x30,0x3C,0x00},
              {0x00,0x60,0x30,0x18,0x0C,0x06,0x00,0x00}, {0x3C,0x0C,0x0C,0x0C,0x0C,0x0C,0x3C,0x00},
              {0x18,0x3C,0x66,0x00,0x00,0x00,0x00,0x00}, {0x00,0x00,0x00,0x00,0x00,0x00,0x00,0xFF},
              {0x30,0x18,0x0C,0x00,0x00,0x00,0x00,0x00}, {0x00,0x00,0x3C,0x06,0x3E,0x66,0x3E,0x00},
              {0x60,0x60,0x7C,0x66,0x66,0x66,0x7C,0x00}, {0x00,0x00,0x3C,0x60,0x60,0x60,0x3C,0x00},
              {0x06,0x06,0x3E,0x66,0x66,0x66,0x3E,0x00}, {0x00,0x00,0x3C,0x66,0x7E,0x60,0x3C,0x00},
              {0x1C,0x30,0x7C,0x30,0x30,0x30,0x30,0x00}, {0x00,0x00,0x3E,0x66,0x66,0x3E,0x06,0x3C},
              {0x60,0x60,0x7C,0x66,0x66,0x66,0x66,0x00}, {0x18,0x00,0x38,0x18,0x18,0x18,0x3C,0x00},
              {0x0C,0x00,0x1C,0x0C,0x0C,0x0C,0x0C,0x38}, {0x60,0x60,0x66,0x6C,0x78,0x6C,0x66,0x00},
              {0x38,0x18,0x18,0x18,0x18,0x18,0x3C,0x00}, {0x00,0x00,0x6C,0xFE,0xD6,0xD6,0xC6,0x00},
              {0x00,0x00,0x7C,0x66,0x66,0x66,0x66,0x00}, {0x00,0x00,0x3C,0x66,0x66,0x66,0x3C,0x00},
              {0x00,0x00,0x7C,0x66,0x66,0x7C,0x60,0x60}, {0x00,0x00,0x3E,0x66,0x66,0x3E,0x06,0x06},
              {0x00,0x00,0x7C,0x66,0x60,0x60,0x60,0x00}, {0x00,0x00,0x3C,0x60,0x3C,0x06,0x3C,0x00},
              {0x30,0x30,0x7C,0x30,0x30,0x30,0x1C,0x00}, {0x00,0x00,0x66,0x66,0x66,0x66,0x3E,0x00},
              {0x00,0x00,0x66,0x66,0x66,0x3C,0x18,0x00}, {0x00,0x00,0xC6,0xD6,0xD6,0xFE,0x6C,0x00},
              {0x00,0x00,0x66,0x3C,0x18,0x3C,0x66,0x00}, {0x00,0x00,0x66,0x66,0x66,0x3E,0x06,0x3C},
              {0x00,0x00,0x7E,0x0C,0x18,0x30,0x7E,0x00}, {0x0E,0x18,0x18,0x70,0x18,0x18,0x0E,0x00},
              {0x18,0x18,0x18,0x00,0x18,0x18,0x18,0x00}, {0x70,0x18,0x18,0x0E,0x18,0x18,0x70,0x00},
              {0x3A,0x6E,0x00,0x00,0x00,0x00,0x00,0x00}
          };
          EOF

          # 3. Основной код ядра (ядро терминала)
          cat > kernel/kernel.c << 'EOF'
          #include "kernel.h"
          #include "font.h"

          uint32_t cursor_x = 10;
          uint32_t cursor_y = 10;
          uint32_t scale = 2;

          void draw_pixel(uint32_t* fb, int x, int y, uint32_t color) {
              if (x >= 0 && x < FB_WIDTH && y >= 0 && y < FB_HEIGHT) {
                  fb[y * FB_WIDTH + x] = color;
              }
          }

          void draw_rect(uint32_t* fb, int x, int y, int w, int h, uint32_t color) {
              for (int i = 0; i < h; i++)
                  for (int j = 0; j < w; j++)
                      draw_pixel(fb, x + j, y + i, color);
          }

          void draw_char(uint32_t* fb, char c, uint32_t x, uint32_t y, uint32_t color) {
              if (c < 32 || c > 126) return;
              unsigned char* bitmap = font8x8[c - 32];
              for (int i = 0; i < 8; i++) {
                  for (int j = 0; j < 8; j++) {
                      if (bitmap[i] & (1 << (7 - j))) {
                          draw_rect(fb, x + j * scale, y + i * scale, scale, scale, color);
                      }
                  }
              }
          }

          void print(uint32_t* fb, const char* str, uint32_t color) {
              while (*str) {
                  if (*str == '\n') {
                      cursor_x = 10;
                      cursor_y += 8 * scale + 4;
                  } else {
                      draw_char(fb, *str, cursor_x, cursor_y, color);
                      cursor_x += 8 * scale;
                  }
                  if (cursor_x > FB_WIDTH - 20) {
                      cursor_x = 10;
                      cursor_y += 8 * scale + 4;
                  }
                  str++;
              }
          }

          int strcmp(const char* s1, const char* s2) {
              while (*s1 && (*s1 == *s2)) { s1++; s2++; }
              return *(unsigned char*)s1 - *(unsigned char*)s2;
          }

          void clear_screen(uint32_t* fb) {
              draw_rect(fb, 0, 0, FB_WIDTH, FB_HEIGHT, BG_COLOR);
              cursor_x = 10;
              cursor_y = 10;
          }

          // Точка входа в ядро
          void aetheria_main(uint32_t* fb, uint8_t* kb, uint32_t w, uint32_t h) {
              clear_screen(fb);
              print(fb, "AetheriaOS v1.0 (Bare Metal C)\n", 0xFF00FF00);
              print(fb, "Kernel loaded at 0x0000\n", TEXT_COLOR);
              print(fb, "Type 'help' for commands.\n\n", TEXT_COLOR);
              
              const char* prompt = "aetheria# ";
              print(fb, prompt, PROMPT_COLOR);

              char input_buffer[64];
              int input_ptr = 0;

              while (1) {
                  uint8_t key = *kb;
                  if (key != 0) {
                      *kb = 0; // Сброс клавиши после чтения

                      if (key == 10) { // Enter
                          print(fb, "\n", TEXT_COLOR);
                          input_buffer[input_ptr] = '\0';
                          
                          if (strcmp(input_buffer, "help") == 0) {
                              print(fb, "Available: help, clear, about, ver\n", TEXT_COLOR);
                          } else if (strcmp(input_buffer, "clear") == 0) {
                              clear_screen(fb);
                          } else if (strcmp(input_buffer, "about") == 0) {
                              print(fb, "AetheriaOS: A real C kernel running in Android sandbox.\n", TEXT_COLOR);
                          } else if (strcmp(input_buffer, "ver") == 0) {
                              print(fb, "Version 1.0.0-C\n", 0xFFFFFF00);
                          } else if (input_ptr > 0) {
                              print(fb, "Unknown command\n", 0xFFFF0000);
                          }

                          input_ptr = 0;
                          print(fb, prompt, PROMPT_COLOR);
                      } 
                      else if (key == 8) { // Backspace
                          if (input_ptr > 0) {
                              input_ptr--;
                              cursor_x -= 8 * scale;
                              draw_rect(fb, cursor_x, cursor_y, 8 * scale, 8 * scale, BG_COLOR);
                          }
                      }
                      else if (key >= 32 && key <= 126 && input_ptr < 63) {
                          input_buffer[input_ptr++] = (char)key;
                          draw_char(fb, (char)key, cursor_x, cursor_y, TEXT_COLOR);
                          cursor_x += 8 * scale;
                      }
                  }
                  
                  // Элементарная задержка (Spin loop)
                  for (volatile int i = 0; i < 10000; i++);
              }
          }
          EOF

          # 4. Скрипт линковки (чтобы aetheria_main была в самом начале)
          cat > kernel/linker.ld << 'EOF'
          ENTRY(aetheria_main)
          SECTIONS {
              . = 0x0;
              .text : { *(.text) }
              .data : { *(.data) }
              .bss  : { *(.bss) }
          }
          EOF

      # ===== КОМПИЛЯЦИЯ ЯДРА =====
      - name: Compile C Kernel
        run: |
          CC=$(find $ANDROID_HOME/ndk -name "aarch64-linux-android34-clang" | head -n 1)
          OBJCOPY=$(find $ANDROID_HOME/ndk -name "llvm-objcopy" | head -n 1)
          
          # Компилируем под голый ARM64 (aarch64)
          $CC -c kernel/kernel.c -o kernel/kernel.o \
              -target aarch64-none-elf \
              -ffreestanding -nostdlib -O2 -Wall
          
          # Линкуем в бинарник
          ld.lld -T kernel/linker.ld kernel/kernel.o -o kernel/kernel.elf --image-base 0
          $OBJCOPY -O binary kernel/kernel.elf kernel.bin

      # ===== СОЗДАНИЕ ANDROID APP (ОБОЛОЧКА) =====
      - name: Create Android Project
        run: |
          mkdir -p app/src/main/{java/com/aetheria/os,cpp,res/raw,res/layout}
          cp kernel.bin app/src/main/res/raw/kernel_bin
          
          # MainActivity (Java)
          cat > app/src/main/java/com/aetheria/os/MainActivity.java << 'EOF'
          package com.aetheria.os;
          import android.app.Activity;
          import android.graphics.*;
          import android.os.Bundle;
          import android.view.*;
          import java.nio.ByteBuffer;

          public class MainActivity extends Activity {
              static { System.loadLibrary("loader"); }
              private native void runKernel(byte[] code, ByteBuffer fb, ByteBuffer kb);

              private ByteBuffer frameBuffer = ByteBuffer.allocateDirect(1280 * 720 * 4);
              private ByteBuffer keyBuffer = ByteBuffer.allocateDirect(1);
              private Bitmap screen = Bitmap.createBitmap(1280, 720, Bitmap.Config.ARGB_8888);

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  SurfaceView sv = new SurfaceView(this);
                  setContentView(sv);
                  
                  sv.setFocusableInTouchMode(true);
                  sv.requestFocus();

                  sv.setOnKeyListener((v, code, ev) -> {
                      if (ev.getAction() == KeyEvent.ACTION_DOWN) {
                          int c = ev.getUnicodeChar();
                          if (code == KeyEvent.KEYCODE_DEL) c = 8;
                          if (code == KeyEvent.KEYCODE_ENTER) c = 10;
                          if (c != 0) keyBuffer.put(0, (byte)c);
                      }
                      return true;
                  });

                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              try {
                                  byte[] k = getResources().openRawResource(R.raw.kernel_bin).readAllBytes();
                                  runKernel(k, frameBuffer, keyBuffer);
                              } catch(Exception e) {}
                          }).start();
                          
                          new Thread(() -> {
                              while(true) {
                                  Canvas c = h.lockCanvas();
                                  if (c != null) {
                                      frameBuffer.position(0);
                                      screen.copyPixelsFromBuffer(frameBuffer);
                                      c.drawBitmap(screen, null, new Rect(0,0,sv.getWidth(),sv.getHeight()), null);
                                      h.unlockCanvasAndPost(c);
                                  }
                                  try { Thread.sleep(16); } catch(Exception e){}
                              }
                          }).start();
                      }
                      public void surfaceChanged(SurfaceHolder h, int f, int w, int h2) {}
                      public void surfaceDestroyed(SurfaceHolder h) {}
                  });
              }
          }
          EOF

          # Loader (C++)
          cat > app/src/main/cpp/loader.cpp << 'EOF'
          #include <jni.h>
          #include <sys/mman.h>
          #include <string.h>

          extern "C" JNIEXPORT void JNICALL
          Java_com_aetheria_os_MainActivity_runKernel(JNIEnv* env, jobject obj, jbyteArray code, jobject fb, jobject kb) {
              jsize size = env->GetArrayLength(code);
              jbyte* data = env->GetByteArrayElements(code, 0);
              void* fb_ptr = env->GetDirectBufferAddress(fb);
              void* kb_ptr = env->GetDirectBufferAddress(kb);

              void* mem = mmap(0, size, PROT_READ|PROT_WRITE|PROT_EXEC, MAP_PRIVATE|MAP_ANONYMOUS, -1, 0);
              memcpy(mem, data, size);
              __builtin___clear_cache((char*)mem, (char*)mem + size);

              ((void(*)(void*, void*, int, int))mem)(fb_ptr, kb_ptr, 1280, 720);
          }
          EOF

          # CMake
          echo 'add_library(loader SHARED loader.cpp)' > app/src/main/cpp/CMakeLists.txt

          # Gradle & Manifest
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.aetheria.os'
              compileSdk 34
              defaultConfig { applicationId 'com.aetheria.os'; minSdk 24 }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF
          
          echo 'include ":app"' > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="AetheriaOS-C">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # ===== СБОРКА APK =====
      - name: Build Final APK
        run: |
          chmod +x gradlew || true
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AetheriaOS-C-BareMetal
          path: app/build/outputs/apk/debug/app-debug.apk
